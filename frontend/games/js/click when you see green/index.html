<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Click When You See Green</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Poppins">
    <link rel="stylesheet" href="./index.css">
</head>
<body>
    <main>
        <div id="game-panel">
            <p id="tip">Click on the button when it's green<br>
                You have 5 attempts.
            </p>
            <p id="score-text">0</p>
            <button class="primary-btn" id="click-btn">Click ME!!!</button>
        </div>
        <div id="gameover-panel">
            <p id="gameover-text">Game Over</p>
            <button id="reset-btn">Reset</button>
        </div>
    </main>
    <script src="./js/index.js" type="module"></script>
</body>
</html>
